<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link href="../styles/common.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .settings-container {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.3) 0%, rgba(20, 20, 20, 0.4) 100%);
            backdrop-filter: blur(25px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
        }

        .settings-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-app-region: drag;
            flex-shrink: 0;
        }

        .header-title {
            color: rgba(255, 255, 255, 0.95);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .header-actions {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        .settings-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.9);
        }

        .settings-section {
            margin-bottom: 24px;
        }

        .settings-section:last-child {
            margin-bottom: 0;
        }

        .settings-section-title {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-section-content {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 16px;
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 8px;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .settings-item:last-child {
            margin-bottom: 0;
        }

        .settings-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .settings-item-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
        }

        .settings-item-description {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .btn.btn-danger {
            background: rgba(244, 67, 54, 0.6);
            padding: 4px 8px;
            font-size: 11px;
        }

        .btn.btn-danger:hover {
            background: rgba(244, 67, 54, 0.9);
        }

        .btn.btn-sm {
            padding: 4px 10px;
            font-size: 11px;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            padding: 8px 12px;
            color: rgba(255, 255, 255, 0.95);
            font-size: 13px;
            width: 100%;
            max-width: 300px;
        }

        .input-field:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
        }

        select.input-field {
            cursor: pointer;
            padding-right: 30px;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='rgba(255, 255, 255, 0.5)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
        }

        select.input-field option {
            background: #1a1a1a;
            color: #ffffff;
            padding: 8px;
        }

        /* Context files list */
        .context-files-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .context-file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            margin-bottom: 6px;
            gap: 8px;
        }

        .context-file-item:last-child {
            margin-bottom: 0;
        }

        .context-file-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex: 1;
        }

        .context-file-name {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .context-file-size {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 2px;
        }

        .context-files-list {
            margin-top: 10px;
            max-height: 160px;
            overflow-y: auto;
        }

        .context-empty-msg {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
            padding: 8px 0;
            margin-top: 8px;
        }

        .context-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }

        /* Stealth scrollbar */
        ::-webkit-scrollbar {
            width: 2px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1px;
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="settings-header">
            <div class="header-title">
                <i class="fas fa-cog"></i>
                Settings
            </div>
            <div class="header-actions">
<button id="closeSettingsBtn" title="Close" style="background:none;border:none;color:rgba(255,255,255,0.45);font-size:16px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;transition:color 0.15s,background 0.15s;-webkit-app-region:no-drag;" onmouseover="this.style.color='rgba(255,255,255,0.9)';this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.color='rgba(255,255,255,0.45)';this.style.background='none'">&#x2715;</button>
            </div>
        </div>

        <div class="settings-content">
            <!-- Language & Skills -->
            <div class="settings-section">
                <div class="settings-section-title">
                    <i class="fas fa-code"></i>
                    Language & Skills
                </div>
                <div class="settings-section-content">
                    <div class="settings-item">
                        <div>
                            <div class="settings-item-label">Coding Language</div>
                            <div class="settings-item-description">Select language for code responses, or None for regular answers</div>
                        </div>
                        <select class="input-field" id="codingLanguage">
                            <option value="none">None (Regular)</option>
                            <option value="cpp">C++</option>
                            <option value="c">C</option>
                            <option value="python">Python</option>
                            <option value="java">Java</option>
                            <option value="javascript">JavaScript</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Context Files -->
            <div class="settings-section">
                <div class="settings-section-title">
                    <i class="fas fa-file-code"></i>
                    Files
                </div>
                <div class="settings-section-content">
                    <div class="settings-item">
                        <div>
                            <div class="settings-item-label">Add files or folders</div>
                            <div class="settings-item-description">Content will be included as context in upcoming chats</div>
                        </div>
                        <div class="context-files-actions">
                            <button class="btn btn-sm" id="addFileBtn">
                                <i class="fas fa-file-plus"></i> File
                            </button>
                        </div>
                    </div>
                    <div class="context-files-list" id="contextFilesList"></div>
                    <div class="context-empty-msg" id="noContextFilesMsg">No context files added</div>
                    <div class="context-footer" id="contextFooter" style="display:none;">
                        <button class="btn btn-danger btn-sm" id="clearContextBtn">
                            <i class="fas fa-trash"></i> Clear All
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../controllers/settings-window.js"></script>
</body>
</html>
